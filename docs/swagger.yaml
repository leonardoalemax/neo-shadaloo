basePath: /
definitions:
  battlelog.Battlelog:
    properties:
      bannerInfo:
        $ref: '#/definitions/battlelog.FighterBannerInfo'
      cachedAt:
        type: integer
      replays:
        items:
          $ref: '#/definitions/battlelog.Replay'
        type: array
      userId:
        type: string
    type: object
  battlelog.CalendarStat:
    properties:
      by_day:
        additionalProperties:
          $ref: '#/definitions/battlelog.DayStat'
        type: object
      by_weekday:
        items:
          $ref: '#/definitions/battlelog.DayStat'
        type: array
    type: object
  battlelog.CharStat:
    properties:
      clean_losses:
        type: integer
      close_losses:
        type: integer
      losses:
        type: integer
      name:
        type: string
      priority_score:
        type: number
      tool_name:
        type: string
      total:
        type: integer
      win_rate:
        type: integer
      wins:
        type: integer
    type: object
  battlelog.CharacterRankStat:
    properties:
      league_rank:
        type: integer
      lp:
        type: integer
      name:
        type: string
      tool_name:
        type: string
    type: object
  battlelog.DayStat:
    properties:
      total:
        type: integer
      wins:
        type: integer
    type: object
  battlelog.FavoriteCharacterLeagueInfo:
    properties:
      league_point:
        type: integer
      league_rank:
        type: integer
      league_rank_info:
        $ref: '#/definitions/battlelog.LeagueRankInfo'
      master_league:
        type: integer
      master_rating:
        type: integer
      master_rating_ranking:
        type: integer
    type: object
  battlelog.FighterBannerInfo:
    properties:
      favorite_character_alpha:
        type: string
      favorite_character_league_info:
        $ref: '#/definitions/battlelog.FavoriteCharacterLeagueInfo'
      favorite_character_name:
        type: string
      favorite_character_play_point:
        $ref: '#/definitions/battlelog.PlayPoint'
      favorite_character_tool_name:
        type: string
      personal_info:
        $ref: '#/definitions/battlelog.PersonalInfo'
      profile_comment:
        $ref: '#/definitions/battlelog.ProfileComment'
      title_data:
        $ref: '#/definitions/battlelog.TitleData'
    type: object
  battlelog.HourStat:
    properties:
      hour:
        type: integer
      total:
        type: integer
      wins:
        type: integer
    type: object
  battlelog.HourlyStats:
    properties:
      hours:
        items:
          $ref: '#/definitions/battlelog.HourStat'
        type: array
    type: object
  battlelog.LPEntry:
    properties:
      date:
        description: YYYY-MM-DD
        type: string
      lp:
        type: integer
    type: object
  battlelog.LPHistory:
    properties:
      entries:
        items:
          $ref: '#/definitions/battlelog.LPEntry'
        type: array
    type: object
  battlelog.LeagueRankInfo:
    properties:
      league_rank_name:
        type: string
      league_rank_number:
        type: integer
    type: object
  battlelog.PersonalInfo:
    properties:
      fighter_id:
        type: string
      platform_name:
        type: string
      platform_tool_name:
        type: string
      short_id:
        type: integer
    type: object
  battlelog.PlayPoint:
    properties:
      battle_hub:
        type: integer
      fighting_ground:
        type: integer
      world_tour:
        type: integer
    type: object
  battlelog.PlayerInfo:
    properties:
      allow_cross_play:
        type: boolean
      battle_input_type:
        type: integer
      battle_input_type_name:
        type: string
      character_id:
        type: integer
      character_name:
        type: string
      character_tool_name:
        type: string
      league_point:
        type: integer
      league_rank:
        type: integer
      player:
        $ref: '#/definitions/battlelog.PlayerRef'
      playing_character_id:
        type: integer
      playing_character_name:
        type: string
      playing_character_tool_name:
        type: string
      round_results:
        items:
          type: integer
        type: array
    type: object
  battlelog.PlayerRef:
    properties:
      fighter_id:
        type: string
      platform_id:
        type: integer
      platform_name:
        type: string
      platform_tool_name:
        type: string
      short_id:
        type: integer
    type: object
  battlelog.ProfileComment:
    properties:
      profile_tag_name:
        type: string
    type: object
  battlelog.Replay:
    properties:
      player1_info:
        $ref: '#/definitions/battlelog.PlayerInfo'
      player2_info:
        $ref: '#/definitions/battlelog.PlayerInfo'
      replay_battle_sub_type_name:
        type: string
      replay_battle_type:
        type: integer
      replay_battle_type_name:
        type: string
      replay_id:
        type: string
      uploaded_at:
        type: integer
      views:
        type: integer
    type: object
  battlelog.ReplayPage:
    properties:
      page:
        type: integer
      replays:
        items:
          $ref: '#/definitions/battlelog.Replay'
        type: array
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  battlelog.TitleData:
    properties:
      title_data_plate_name:
        type: string
      title_data_val:
        type: string
    type: object
  battlelog.WinLossStat:
    properties:
      losses:
        type: integer
      total:
        type: integer
      win_pct:
        type: integer
      wins:
        type: integer
    type: object
  ranking.CharacterCount:
    properties:
      character_name:
        type: string
      character_tool_name:
        type: string
      count:
        type: integer
    type: object
  ranking.Entry:
    properties:
      character_id:
        description: personagem usado nessa entrada
        type: integer
      character_name:
        type: string
      character_tool_name:
        type: string
      fighter_id:
        type: string
      full_data:
        description: JSON completo do entry (para campos não-extraídos)
        type: object
      home_id:
        type: integer
      league_point:
        type: integer
      league_rank:
        type: integer
      master_league:
        type: integer
      master_rating:
        type: integer
      master_rating_ranking:
        type: integer
      order:
        description: posição global no ranking (1, 2, 3, ...)
        type: integer
      platform_id:
        type: integer
      ranking_type:
        $ref: '#/definitions/ranking.RankingType'
      short_id:
        type: integer
    type: object
  ranking.Facets:
    properties:
      characters:
        items:
          $ref: '#/definitions/ranking.CharacterCount'
        type: array
      homes:
        items:
          $ref: '#/definitions/ranking.HomeCount'
        type: array
    type: object
  ranking.HomeCount:
    properties:
      count:
        type: integer
      home_id:
        type: integer
    type: object
  ranking.ListPage:
    properties:
      current_page:
        type: integer
      entries:
        items:
          $ref: '#/definitions/ranking.Entry'
        type: array
      limit:
        type: integer
      total_count:
        type: integer
      total_pages:
        type: integer
    type: object
  ranking.RankingType:
    enum:
    - league_point
    - arcade_score
    - kudos
    - master_rating
    type: string
    x-enum-comments:
      RankingArcade: Pontuação no Arcade
      RankingKudos: Kudos (PP)
      RankingLeague: Pontos da Liga
      RankingMaster: Avaliação de Mestre
    x-enum-descriptions:
    - Pontos da Liga
    - Pontuação no Arcade
    - Kudos (PP)
    - Avaliação de Mestre
    x-enum-varnames:
    - RankingLeague
    - RankingArcade
    - RankingKudos
    - RankingMaster
  ranking.SnapshotMeta:
    properties:
      last_synced_at:
        description: quando o último sync COMPLETOU com sucesso
        type: integer
      ranking_type:
        $ref: '#/definitions/ranking.RankingType'
      started_at:
        description: quando o sync atual/último começou
        type: integer
      status:
        description: '"running", "done", "failed"'
        type: string
      synced_pages:
        type: integer
      total_count:
        type: integer
      total_pages:
        type: integer
      updated_at:
        description: última atividade (atualizado a cada progresso)
        type: integer
    type: object
  usage.CharUsageEntry:
    properties:
      character_alpha:
        type: string
      character_tool_name:
        type: string
      play_rate:
        type: number
      previous_rate:
        type: number
    type: object
  usage.LeagueUsage:
    properties:
      entries:
        items:
          $ref: '#/definitions/usage.CharUsageEntry'
        type: array
      league_alpha:
        type: string
      league_rank:
        type: integer
      operation_type:
        type: integer
    type: object
  usage.UsageSnapshot:
    properties:
      cached_at:
        type: integer
      leagues:
        items:
          $ref: '#/definitions/usage.LeagueUsage'
        type: array
      yyyymm:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    name: Leo Alemax
  description: Caching proxy between the Street Fighter 6 Buckler API and PostgreSQL.
    Serves cached battlelog data instantly and syncs with SF6 asynchronously in the
    background.
  title: neo-shadaloo API
  version: "1.0"
paths:
  /v1/battlelog/{userId}:
    get:
      description: Returns the cached battlelog from the database. If the cache is
        stale (>5 min), a background sync with the SF6 API is triggered without blocking
        the response. If no data exists yet, an empty replay list is returned and
        sync is triggered.
      parameters:
      - description: SF6 fighter ID
        example: "3378249682"
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/battlelog.Battlelog'
        "400":
          description: userId required
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      summary: Get battlelog for a user
      tags:
      - battlelog
  /v1/battlelog/{userId}/calendar:
    get:
      description: Returns battles grouped by calendar day (YYYY-MM-DD) and by weekday
        (0=Sun..6=Sat).
      parameters:
      - description: SF6 fighter ID
        example: "3378249682"
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/battlelog.CalendarStat'
        "400":
          description: userId required
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      summary: Get calendar heatmap data for a user
      tags:
      - battlelog
  /v1/battlelog/{userId}/character-ranks:
    get:
      parameters:
      - description: SF6 fighter ID
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/battlelog.CharacterRankStat'
            type: array
      summary: Get most recent LP and rank per character for a user
      tags:
      - battlelog
  /v1/battlelog/{userId}/hourly:
    get:
      description: Returns win/loss counts grouped by hour of day (0–23) for a heatmap
        chart.
      parameters:
      - description: SF6 fighter ID
        example: "3378249682"
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/battlelog.HourlyStats'
        "400":
          description: userId required
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      summary: Get hourly win-rate heatmap for a user
      tags:
      - battlelog
  /v1/battlelog/{userId}/lp-history:
    get:
      description: Returns daily LP values (last match per day) sorted oldest-first,
        for plotting an LP progression chart.
      parameters:
      - description: SF6 fighter ID
        example: "3378249682"
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/battlelog.LPHistory'
        "400":
          description: userId required
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      summary: Get LP evolution history for a user
      tags:
      - battlelog
  /v1/battlelog/{userId}/opponents:
    get:
      description: Returns stats grouped by opponent character, sorted by total battles
        descending. Includes priority score for training recommendations.
      parameters:
      - description: SF6 fighter ID
        example: "3378249682"
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/battlelog.CharStat'
            type: array
        "400":
          description: userId required
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      summary: Get per-opponent-character stats for a user
      tags:
      - battlelog
  /v1/battlelog/{userId}/profile:
    get:
      description: Returns only the fighter banner info from the cached battlelog.
        Lighter alternative to the full battlelog endpoint.
      parameters:
      - description: SF6 fighter ID
        example: "3378249682"
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/battlelog.FighterBannerInfo'
        "400":
          description: userId required
          schema:
            type: string
        "404":
          description: no profile data yet
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      summary: Get profile/banner info for a user
      tags:
      - battlelog
  /v1/battlelog/{userId}/replays:
    get:
      description: 'Returns a paginated list of replays from the cached battlelog.
        Triggers a background sync if the cache is stale. Query params: page (default
        1), limit (default 20, max 100).'
      parameters:
      - description: SF6 fighter ID
        example: "3378249682"
        in: path
        name: userId
        required: true
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/battlelog.ReplayPage'
        "400":
          description: userId required
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      summary: Get paginated replays for a user
      tags:
      - battlelog
  /v1/battlelog/{userId}/stats:
    get:
      description: Returns aggregated win/loss statistics computed from the cached
        battlelog.
      parameters:
      - description: SF6 fighter ID
        example: "3378249682"
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/battlelog.WinLossStat'
        "400":
          description: userId required
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      summary: Get win/loss stats for a user
      tags:
      - battlelog
  /v1/battlelog/{userId}/sync:
    post:
      description: Triggers an immediate background sync with the SF6 API for the
        given user, regardless of cache freshness. Returns 202 immediately; the sync
        runs asynchronously and notifies connected WebSocket clients when complete.
      parameters:
      - description: SF6 fighter ID
        example: "3378249682"
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: sync started
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: userId required
          schema:
            type: string
      summary: Force a battlelog sync
      tags:
      - battlelog
  /v1/battlelog/{userId}/ws:
    get:
      description: Upgrades the connection to WebSocket. The server sends a JSON message
        `{"type":"update","cachedAt":<ms>}` whenever a sync completes for this user.
        The client should re-fetch `/v1/battlelog/{userId}` on receipt. A ping is
        sent every 30 seconds to keep the connection alive.
      parameters:
      - description: SF6 fighter ID
        example: "3378249682"
        in: path
        name: userId
        required: true
        type: string
      responses:
        "101":
          description: Switching Protocols
        "400":
          description: userId required
          schema:
            type: string
      summary: Subscribe to real-time battlelog updates
      tags:
      - battlelog
  /v1/health:
    get:
      description: Returns 200 if the server is running.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - system
  /v1/ranking/{type}:
    get:
      parameters:
      - description: Tipo de ranking
        enum:
        - league_point
        - arcade_score
        - kudos
        - master_rating
        in: path
        name: type
        required: true
        type: string
      - description: Página (1-based)
        in: query
        name: page
        type: integer
      - description: Items por página (max 200, default 50)
        in: query
        name: limit
        type: integer
      - description: 'Filtrar por character_tool_name (ex: zangief)'
        in: query
        name: character
        type: string
      - description: Filtrar por região (home_id)
        in: query
        name: home_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ranking.ListPage'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Lista paginada do ranking
      tags:
      - ranking
  /v1/ranking/{type}/around/{order}:
    get:
      parameters:
      - description: Tipo de ranking
        in: path
        name: type
        required: true
        type: string
      - description: Posição central (order_no)
        in: path
        name: order
        required: true
        type: integer
      - description: Raio (default 5, max 100)
        in: query
        name: radius
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/ranking.Entry'
            type: array
      summary: Vizinhança de uma posição no ranking
      tags:
      - ranking
  /v1/ranking/{type}/facets:
    get:
      parameters:
      - description: Tipo de ranking
        in: path
        name: type
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ranking.Facets'
      summary: Facets do ranking (personagens + regiões)
      tags:
      - ranking
  /v1/ranking/{type}/player/{short_id}:
    get:
      parameters:
      - description: Tipo de ranking
        in: path
        name: type
        required: true
        type: string
      - description: Short ID do jogador
        in: path
        name: short_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/ranking.Entry'
            type: array
      summary: Posição de um jogador no ranking
      tags:
      - ranking
  /v1/ranking/{type}/status:
    get:
      parameters:
      - description: Tipo de ranking
        in: path
        name: type
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ranking.SnapshotMeta'
      summary: Estado de sync de um ranking
      tags:
      - ranking
  /v1/ranking/{type}/sync:
    post:
      parameters:
      - description: Tipo de ranking
        enum:
        - league_point
        - arcade_score
        - kudos
        - master_rating
        in: path
        name: type
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Dispara sync de um ranking específico
      tags:
      - ranking
  /v1/ranking/sync:
    post:
      description: Faz o crawl de todas as páginas dos 4 rankings (league, arcade,
        kudos, master) em background. Snapshot atual — substitui dados anteriores.
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Dispara sync de todos os rankings globais
      tags:
      - ranking
  /v1/usage/{yyyymm}:
    get:
      description: Returns cached character usage rates (usagerate_list) for the given
        YYYYMM period. Triggers a background sync if missing or stale (>24h).
      parameters:
      - description: Year-month (e.g. 202602)
        in: path
        name: yyyymm
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usage.UsageSnapshot'
        "400":
          description: invalid yyyymm
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      summary: Get character usage rates for a given month
      tags:
      - usage
  /v1/usage/{yyyymm}/sync:
    post:
      description: Triggers an immediate background sync with the SF6 API for the
        given YYYYMM period. Returns 202 immediately.
      parameters:
      - description: Year-month (e.g. 202602)
        in: path
        name: yyyymm
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: invalid yyyymm
          schema:
            type: string
      summary: Force a usage data sync for a given month
      tags:
      - usage
  /v1/usage/months:
    get:
      description: Returns YYYYMM periods that have cached usage data, sorted newest-first.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: string
            type: array
        "500":
          description: internal server error
          schema:
            type: string
      summary: List available usage months
      tags:
      - usage
schemes:
- http
- ws
swagger: "2.0"
